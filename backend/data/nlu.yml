version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening

- intent: goodbye
  examples: |
    - goodbye
    - good bye
    - see you around
    - see you later
    - bye
    - bye bye

