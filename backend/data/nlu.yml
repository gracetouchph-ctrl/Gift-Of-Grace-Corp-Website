version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening

- intent: goodbye
  examples: |
    - goodbye
    - good bye
    - see you around
    - see you later
    - bye
    - bye bye

- intent: search_knowledge
  examples: |
    - what are the [traffic rules](question) in baguio?
    - [traffic rules in baguio](question)
    - tell me about [baguio traffic regulations](question)
    - [baguio city traffic laws](question)
    - what are the [driving rules in baguio](question)?
    - [traffic violations in baguio](question)
    - [baguio traffic](question)
    - [road rules baguio](question)
    - [transportation rules baguio city](question)
    - [baguio city ordinances traffic](question)
    - traffic rules in baguio
    - baguio traffic rules
    - what are traffic rules in baguio
    - tell me traffic rules in baguio city

- intent: ask_ordinance
  examples: |
    - search ordinances
    - look up city laws
    - find ordinance information
    - check city regulations
    - search legal documents
    - look up municipal code
    - find city ordinances
    - check local laws
    - search baguio ordinances
    - find legal requirements

- intent: ordinance_help
  examples: |
    - how to search ordinances
    - what ordinances do you have
    - help with legal search
    - how to find laws
    - ordinance search help
    - how to use ordinance system

- intent: ask_penalty
  examples: |
    - what are the penalties for [littering](violation_type)?
    - how much is the fine for [illegal parking](violation_type)?
    - what happens if I violate the [noise ordinance](violation_type)?
    - penalties for [smoking in public](violation_type)
    - fines for [illegal vending](violation_type)
    - what's the penalty for [jaywalking](violation_type)?
    - show me penalty information
    - what are the fines?
    - violation penalties
    - ordinance penalties

- intent: ask_business_permit
  examples: |
    - how to get a business permit?
    - what are the requirements for business registration?
    - I want to start a business in Baguio
    - business permit process
    - requirements for opening a store
    - business license requirements
    - how to register a business
    - commercial permit process

- intent: ask_ordinance_stats
  examples: |
    - how many ordinances do you have?
    - show me ordinance system status
    - what's in your ordinance database?
    - ordinance statistics
    - legal document count
    - how many laws in your system

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you a human?
    - am I talking to a bot?
    - am I talking to a human?

- intent: ask_question
  examples: |
    - I have a question
    - can you answer something?
    - I need information
    - can you help me find something?
    - I want to ask something

- intent: help
  examples: |
    - help
    - what can you do?
    - how does this work?
    - show me what you can do
    - I need help
    - instructions

- intent: check_knowledge_base
  examples: |
    - check knowledge base
    - what documents do you have?
    - knowledge base status
    - how many documents do you have?
    - show me your knowledge base

- intent: add_documents
  examples: |
    - how to add documents
    - add documents
    - add more files
    - how do I add to your knowledge base?
    - import documents

- intent: thankyou
  examples: |
    - thanks
    - thank you
    - thank you so much
    - thanks a lot
    - appreciate it

- intent: out_of_scope
  examples: |
    - what's the weather like?
    - tell me a joke
    - what time is it?
    - how old are you?
    - where do you live?

- intent: nlu_fallback
  examples: |
    - asdfasdf
    - jibberish
    - 12345
    - ????
    - !@#$%

- intent: restart
  examples: |
    - restart conversation
    - start over
    - clear history
    - begin again
    - reset chat

- intent: show_capabilities
  examples: |
    - what can you do
    - show your capabilities
    - what are your features
    - tell me about your abilities
    - what can you help with