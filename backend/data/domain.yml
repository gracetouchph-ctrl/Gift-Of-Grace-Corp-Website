version: "3.1"

intents:
  - greet
  - goodbye
  - bot_challenge
  - ask_question
  - search_knowledge
  - help
  - check_knowledge_base
  - add_documents
  - thankyou
  - out_of_scope
  - nlu_fallback
  - restart
  - show_capabilities

entities:
  - question

slots:
  search_query:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
  last_search_time:
    type: text
    influence_conversation: false
    mappings:
    - type: custom

responses:
  # utter_greet has been REMOVED to prevent automatic greeting
  # The conversation will now start naturally without a long automatic message

  utter_goodbye:
  - text: "Goodbye! Feel free to ask if you have more questions."

  utter_iamabot:
  - text: "I am an AI assistant with access to a knowledge base. I can search through documents and answer your questions based on their content."

  utter_help:
  - text: "I can answer questions based on my knowledge base. Try asking about specific topics in the documents I have access to!"

  utter_searching:
  - text: "🔍 Searching my knowledge base for relevant information..."

  utter_thankyou:
  - text: "You're welcome! Happy to help."

  utter_out_of_scope:
  - text: "I'm mainly designed to answer questions based on my knowledge base. I might not have information about that topic."

  utter_default:
  - text: "I'm not sure I understand. You can ask me questions about my knowledge base or say 'help' to see what I can do."

actions:
  - action_session_start
  - action_search_knowledge
  - action_search_ordinances
  - action_ordinance_help
  - action_check_ordinance_system
  - action_provide_help
  - action_fallback
  - action_show_capabilities
  - action_add_document
  - action_check_knowledge_base
  - action_debug_intent
  - action_debug_response
  - action_test_rag_response
  - action_debug_message_flow
  - action_debug_single_response
  - action_query_ordinances
  - action_handle_ordinance_penalty
  - action_handle_business_permit
  - action_show_ordinance_stats

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true