version: "3.1"

rules:

# ============================================================================
# BASIC CONVERSATION RULES
# ============================================================================

- rule: Respond to greeting
  steps:
  - intent: greetings
  - action: utter_greet

- rule: Respond to goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Respond to gratitude
  steps:
  - intent: gratitude
  - action: utter_thank_you

- rule: Respond to affirm
  steps:
  - intent: affirm
  - action: utter_acknowledge

- rule: Respond to deny
  steps:
  - intent: deny
  - action: utter_acknowledge

- rule: Respond to help request
  steps:
  - intent: help_request
  - action: utter_offer_help

- rule: Respond to complaint
  steps:
  - intent: complaint
  - action: action_escalate_to_human

- rule: Respond to suggestion request
  steps:
  - intent: suggestion
  - action: action_recommend_product

- rule: Respond to schedule call
  steps:
  - intent: schedule_call
  - action: utter_escalate_human

