version: "3.1"

intents:
  - greet
  - goodbye
  - thankyou
  - bot_challenge
  - help
  - corporate_query
  - ask_products
  - ask_awards
  - ask_contact
  - ask_founders
  - ask_location
  - check_knowledge_base
  - add_documents
  - out_of_scope
  - nlu_fallback
  - restart
  - show_capabilities

slots:
  search_query:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
  last_search_time:
    type: text
    influence_conversation: false
    mappings:
    - type: custom

responses:
  utter_default:
  - text: "I'm not sure I understand. Ask me about Gift of Grace - products, founders, awards, or contact info!"

actions:
  - action_session_start
  - action_greet
  - action_goodbye
  - action_thankyou
  - action_bot_challenge
  - action_help
  - action_out_of_scope
  - action_handle_products
  - action_handle_founders
  - action_handle_awards
  - action_handle_location
  - action_handle_contact
  - action_corporate_query
  - action_fallback
  - action_check_knowledge_base
  - action_add_document
  - action_show_capabilities
  - action_restart

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
