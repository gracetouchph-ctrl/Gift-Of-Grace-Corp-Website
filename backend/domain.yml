  utter_ibs_guidance:
    - text: |
        **Fermented Foods & IBS - Realistic Guidance:**
        
        The good news: Probiotics CAN help IBS by:
        - Reducing inflammation in the gut
        - Healing the intestinal barrier
        - Improving nutrient absorption
        - Balancing gut microbiota
        
        ⚠️ **The reality:** Some people initially experience bloating as their microbiome adjusts (FODMAP sensitivity).
        
        **Start Slow Protocol:**
        1. Begin with 1-2 tablespoons daily (not full servings)
        2. Gradually increase over 2-3 weeks
        3. Drink extra water—fiber in fermented foods needs hydration
        4. Track symptoms in a journal
        
        **Try This First:**
        Our **Kongnamul variety** (lighter ferment) is gentler than traditional Tongbaechu. Less FODMAP content, milder fermentation intensity.
        
        **When to Seek Help:**
        If you experience severe bloating or worsening symptoms beyond 1-2 weeks, contact us at kimchigit@gmail.com with your health profile. Grace can give personalized advice.
        
        Ready to start with a small sampler pack?

