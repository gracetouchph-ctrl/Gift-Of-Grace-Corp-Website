        **Quick Kimchi Recipes:**
        
        ⏰ **5-Minute Kimchi Rice Bowl**
        1. Warm rice in bowl
        2. Top with kimchi + 1 tbsp brine
        3. Add protein (egg, salmon, chicken)
        4. Drizzle sesame oil
        5. Enjoy!
        
        🥘 **Kimchi Jjigae (Stew)** - Classic comfort food
