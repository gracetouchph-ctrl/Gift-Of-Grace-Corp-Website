  utter_storage_info:
    - text: |
        **Storage & Shelf Life:**
        
        🧊 **Refrigerate Immediately After Delivery**
        - Fermentation slows dramatically in cold
        - Extends shelf life to 3-6 months
        - Probiotics stay active in fridge
        
        📅 **Shelf Life Timeline:**
        - Fresh (0-2 weeks): Crispy, active fermentation
        - Aged (2-6 weeks): Tangy flavor develops, more probiotics
        - Long-term (1-6 months): Flavor deepens, probiotics remain viable
        
        ⚠️ **Signs of Spoilage (Discard):**
        ❌ Mold on surface (white or colored)
        ❌ Off smell (not just funk—actual rot)
        ❌ Sliminess
        ❌ Unusual cloudiness (some cloudiness is normal—LAB!)
        ✅ Fizzing = normal fermentation
        ✅ Cloudiness = active probiotics
        
        **Freezing:**
        Yes, you can freeze! Texture may change slightly (softer), but probiotics remain viable. Thaw in fridge.
        
